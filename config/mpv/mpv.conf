# Youtube
script-opts=ytdl_hook-ytdl_path=yt-dlp
ytdl-format='bestvideo[height<=720]+bestaudio/best[height<=720]'

# IPC socket
input-ipc-server=/tmp/mpv-socket

# Subtitles
no-embeddedfonts
sub-use-margins=no
sub-border-color="#FF141E25"
sub-border-size=2
sub-color="#FFFFFFFF"
sub-bold=no
sub-font="Source Sans Pro"
sub-font-size=40
sub-shadow-color="#FF141E25"
sub-shadow-offset=2
sub-blur=0
sub-auto=fuzzy

# Default sub lang
slang=eng,en
alang=jpn,eng,en,rus,ru

# Enable hardware decoding
hwdec=auto

[downscale-heavy-on-igpu]
profile-cond=(width or 0) >= 2560 and (container-fps or 0) > 30
profile-restore=copy-equal
scale=bilinear
dscale=bilinear
cscale=bilinear
dither=no
correct-downscaling=no
sigmoid-upscaling=no

[extension.webm]
loop-file=yes

[extension.gifv]
loop-file=yes

[extension.gif]
loop-file=inf

